<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCcrop — Dataset Preview</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; }

/* Sidebar */
#sidebar {
  width: 300px; min-width: 300px; overflow-y: auto; background: #1a1a2e; color: #e0e0e0;
  padding: 12px; font-size: 13px; display: flex; flex-direction: column;
}
#sidebar h1 { font-size: 16px; margin-bottom: 8px; color: #fff; }
#sidebar input[type=text] {
  width: 100%; padding: 6px 10px; margin-bottom: 10px; border: 1px solid #333;
  border-radius: 6px; background: #16213e; color: #e0e0e0; font-size: 13px; outline: none;
}
#dataset-list { flex: 1; overflow-y: auto; }
.section-title {
  font-size: 11px; font-weight: 700; color: #8888aa; text-transform: uppercase;
  letter-spacing: 0.5px; margin: 10px 0 4px; padding-top: 6px; border-top: 1px solid #2a2a4a;
}
.ds-btn {
  display: block; width: 100%; text-align: left; padding: 6px 10px; margin: 2px 0;
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
  background: transparent; color: #ccc; transition: all 0.15s;
}
.ds-btn:hover { background: #16213e; color: #fff; }
.ds-btn.active { background: #0f3460; color: #4cc9f0; font-weight: 600; }
.ds-btn .sub { display: block; font-size: 10px; color: #777; margin-top: 1px; }
.ds-btn.active .sub { color: #4cc9f0aa; }
.ds-btn.broken { opacity: 0.4; }
.ds-btn.broken::after { content: " (down)"; color: #f44; font-size: 10px; }
.ds-badge {
  display: inline-block; padding: 0 4px; border-radius: 3px; font-size: 9px;
  font-weight: 700; letter-spacing: 0.3px; vertical-align: middle; margin-left: 4px;
}
.ds-badge-pmt { background: #4CAF50; color: #fff; }
.ds-badge-wms { background: #FF9800; color: #fff; }
.ds-badge-xyz { background: #9C27B0; color: #fff; }
.ds-badge-wmts { background: #E65100; color: #fff; }
.ds-badge-ext { background: #2196F3; color: #fff; }

/* Map area */
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Diagnostics bar */
#diag {
  position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #ccc; padding: 6px 14px;
  font-size: 11px; font-family: 'SF Mono', 'Menlo', monospace;
  display: flex; gap: 20px; align-items: center;
}
#diag .label { color: #888; }
#diag .val { color: #4cc9f0; font-weight: 600; }
#diag .warn { color: #f90; }
.src-badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
  font-weight: 700; letter-spacing: 0.3px; vertical-align: middle;
}
.src-pmtiles { background: #4CAF50; color: #fff; }
.src-wms { background: #FF9800; color: #fff; }
.src-xyz { background: #9C27B0; color: #fff; }
.src-wmts { background: #E65100; color: #fff; }
.src-arcgis { background: #2196F3; color: #fff; }

/* Info panel */
#info {
  position: absolute; top: 40px; right: 10px; z-index: 1000;
  background: rgba(0,0,0,0.8); color: #fff; padding: 10px 14px; border-radius: 8px;
  font-size: 12px; max-width: 350px; pointer-events: none;
}
#info .title { font-weight: 700; font-size: 14px; }
#info .detail { color: #aaa; margin-top: 4px; }

/* Year control */
#year-ctrl {
  position: absolute; top: 40px; left: 10px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 8px 14px; border-radius: 8px;
  font-size: 13px; display: none; align-items: center; gap: 8px;
}
#year-ctrl button {
  background: #0f3460; color: #4cc9f0; border: none; border-radius: 4px;
  width: 28px; height: 28px; font-size: 16px; cursor: pointer; font-weight: 700;
}
#year-ctrl button:hover { background: #1a5276; }
#year-ctrl .year-val { font-weight: 700; font-size: 15px; min-width: 40px; text-align: center; }
#year-ctrl input[type=range] { width: 120px; }

/* Map controls */
#map-ctrl {
  position: absolute; bottom: 30px; right: 10px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 10px 14px; border-radius: 8px;
  font-size: 12px; display: flex; flex-direction: column; gap: 6px;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-label { color: #888; font-size: 11px; min-width: 52px; }
#map-ctrl select {
  background: #222; color: #e0e0e0; border: 1px solid #444; border-radius: 4px;
  padding: 3px 6px; font-size: 12px; outline: none; cursor: pointer;
}
#map-ctrl select:hover { border-color: #4cc9f0; }
#map-ctrl input[type=range] { width: 110px; }
#opacity-val { font-size: 11px; color: #aaa; min-width: 28px; }

/* Legend panel */
#legend {
  position: absolute; bottom: 60px; left: 10px; z-index: 1000;
  background: rgba(0,0,0,0.88); color: #fff; padding: 10px 12px; border-radius: 8px;
  font-size: 12px; max-height: 60vh; overflow-y: auto; min-width: 180px; display: none;
}
#legend .legend-title {
  font-weight: 700; font-size: 12px; margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center;
}
#legend .legend-btns { display: flex; gap: 4px; }
#legend .legend-btns button {
  background: #333; color: #aaa; border: none; border-radius: 3px;
  padding: 2px 6px; font-size: 10px; cursor: pointer;
}
#legend .legend-btns button:hover { background: #555; color: #fff; }
.legend-entry {
  display: flex; align-items: center; gap: 6px; padding: 2px 0; cursor: pointer;
  transition: opacity 0.15s;
}
.legend-entry:hover { background: rgba(255,255,255,0.05); }
.legend-entry.hidden { opacity: 0.3; }
.legend-entry.hidden .legend-label { text-decoration: line-through; }
.legend-swatch {
  width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.2);
}
.legend-label { font-size: 11px; }
#legend .no-legend { color: #888; font-style: italic; font-size: 11px; }

/* Varda Field ID panel */
#varda-panel {
  position: absolute; top: 40px; right: 10px; z-index: 1001;
  background: rgba(0,0,0,0.88); color: #e0e0e0; padding: 10px 14px; border-radius: 8px;
  font-size: 12px; max-width: 320px; display: none;
}
#varda-panel.open { display: block; }
#varda-panel .vp-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
#varda-panel .vp-header span { font-weight: 700; color: #7cb342; font-size: 13px; }
#varda-panel .vp-close {
  background: none; border: none; color: #888; cursor: pointer; font-size: 16px;
}
#varda-panel .vp-close:hover { color: #fff; }
#varda-panel .vp-coord { font-size: 10px; color: #888; margin-bottom: 6px; }
#varda-panel .vp-field { margin: 4px 0; font-size: 12px; }
#varda-panel .vp-field a { color: #4cc9f0; text-decoration: none; }
#varda-panel .vp-field a:hover { text-decoration: underline; }
#varda-panel .vp-none { color: #888; font-style: italic; }
.varda-token-row {
  display: flex; align-items: center; gap: 6px; margin-top: 6px;
  padding-top: 6px; border-top: 1px solid #333;
}
.varda-token-row .ctrl-label { min-width: auto; }
.varda-token-row input[type=password] {
  flex: 1; background: #222; color: #e0e0e0; border: 1px solid #444;
  border-radius: 4px; padding: 3px 6px; font-size: 11px; outline: none;
}
.varda-token-row input[type=password]:focus { border-color: #7cb342; }
.varda-token-hint { font-size: 9px; color: #666; margin-top: 2px; }
.varda-token-hint a { color: #7cb342; text-decoration: none; }
#varda-panel .vp-save {
  display: inline-block; margin-top: 6px; font-size: 10px; padding: 3px 10px;
  border: 1px solid #7cb342; border-radius: 3px; background: transparent; color: #7cb342;
  cursor: pointer;
}
#varda-panel .vp-save:hover { background: rgba(124,179,66,0.15); }
</style>
</head>
<body>
<div id="sidebar">
  <h1>ARCcrop Datasets</h1>
  <input type="text" id="search" placeholder="Search datasets...">
  <div id="dataset-list"></div>
</div>
<div id="map-container">
  <div id="map"></div>
  <div id="diag">
    <span><span class="label">Source: </span><span class="val" id="d-src">—</span></span>
    <span><span class="label">Zoom: </span><span class="val" id="d-zoom">3</span></span>
    <span><span class="label">Scale: </span><span class="val" id="d-scale">—</span></span>
    <span><span class="label">Resolution: </span><span class="val" id="d-res">—</span></span>
    <span><span class="label">Tiles: </span><span class="val" id="d-tiles">—</span></span>
  </div>
  <div id="info"></div>
  <div id="year-ctrl">
    <button id="year-prev">&#9664;</button>
    <span class="year-val" id="year-val"></span>
    <input type="range" id="year-slider">
    <button id="year-next">&#9654;</button>
  </div>
  <div id="legend"></div>
  <iframe id="external-viewer" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:500;border:none;"></iframe>
  <div id="map-ctrl">
    <div class="ctrl-row">
      <span class="ctrl-label">Base map</span>
      <select id="basemap-select">
        <option value="satellite">Satellite</option>
        <option value="streets">Streets</option>
        <option value="topo">Topographic</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="osm">OpenStreetMap</option>
      </select>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Overlay</span>
      <input type="range" id="opacity" min="0" max="100" value="70">
      <span id="opacity-val">70%</span>
    </div>
    <div class="varda-token-row">
      <span class="ctrl-label" style="color:#7cb342">Varda</span>
      <input type="text" id="varda-client-id" placeholder="Client ID" style="flex:1;background:#222;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:3px 6px;font-size:10px;outline:none;">
    </div>
    <div class="varda-token-row" style="margin-top:2px;border-top:none;padding-top:0;">
      <span class="ctrl-label" style="min-width:52px;"></span>
      <input type="password" id="varda-client-secret" placeholder="Client Secret" style="flex:1;background:#222;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:3px 6px;font-size:10px;outline:none;">
    </div>
    <div class="varda-token-hint">Free from <a href="https://account.varda.ag" target="_blank">account.varda.ag</a> &mdash; click map to look up</div>
  </div>
  <div id="varda-panel">
    <div class="vp-header">
      <span>Varda Global Field ID</span>
      <button class="vp-close" id="varda-close">&#10005;</button>
    </div>
    <div id="varda-body"></div>
  </div>
</div>

const map = L.map('map', { zoomControl: true }).setView([30, 0], 3);

// Basemap pane sits below the default tilePane (z-index 200)
map.createPane('basemapPane');
map.getPane('basemapPane').style.zIndex = 150;

const basemaps = {
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri', maxZoom: 19, pane: 'basemapPane' }),
  streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM', maxZoom: 19, pane: 'basemapPane' }),
  topo: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri', maxZoom: 19, pane: 'basemapPane' }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO', maxZoom: 19, pane: 'basemapPane' }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO', maxZoom: 19, pane: 'basemapPane' }),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM', maxZoom: 19, pane: 'basemapPane' }),
};
let currentBasemap = basemaps.satellite;
currentBasemap.addTo(map);

L.control.scale({ metric: true, imperial: true, maxWidth: 200 }).addTo(map);

document.getElementById('basemap-select').onchange = function() {
  map.removeLayer(currentBasemap);
  currentBasemap = basemaps[this.value];
  currentBasemap.addTo(map);
};

// ============ BUILD WMS URL ============
function getWmsUrl(ds, year) {
  let baseUrl = ds.wmsYearFn ? ds.wmsYearFn(year) : ds.wms;
  let layers = ds.layerYearFn ? ds.layerYearFn(year) : ds.layers;
  if (baseUrl) baseUrl = baseUrl.replace('{YEAR}', year);
  if (layers) layers = layers.replace('{YEAR}', year);
  return { baseUrl, layers };
}

// ============ CLEAR / SELECT DATASET ============
function clearDataset() {
  if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
  currentMLMap = null;
  const iframe = document.getElementById('external-viewer');
  iframe.style.display = 'none'; iframe.src = '';
  currentDSObj = null; currentDS = null; currentYear = null;
  hiddenClasses = new Set();
  document.getElementById('info').innerHTML = '<div class="detail" style="color:#888">No dataset loaded — select one from the sidebar</div>';
  document.getElementById('d-src').innerHTML = '<span style="color:#888">none</span>';
  document.getElementById('d-res').textContent = '—';
  document.getElementById('d-tiles').textContent = '—';
  document.getElementById('legend').style.display = 'none';
  document.getElementById('year-ctrl').style.display = 'none';
  console.log('%c[Clear] %cDataset unloaded', 'color:#f44;font-weight:bold', 'color:#888');
  buildList(document.getElementById('search').value);
}

function selectDataset(ds) {
  currentDSObj = ds;
  currentDS = ds.id;
  hiddenClasses = new Set();

  // Year setup
  const yc = yearConfig[ds.id];
  if (yc) {
    currentYear = yc.def;
    const yearCtrl = document.getElementById('year-ctrl');
    yearCtrl.style.display = 'flex';
    const slider = document.getElementById('year-slider');
    if (yc.values) {
      slider.min = 0; slider.max = yc.values.length - 1;
      slider.value = yc.values.indexOf(yc.def);
    } else {
      slider.min = yc.min; slider.max = yc.max; slider.value = yc.def;
    }
    updateYearDisplay();
  } else {
    currentYear = null;
    document.getElementById('year-ctrl').style.display = 'none';
  }

  loadLayer();
  map.flyTo(ds.center, ds.zoom, { duration: 1 });

  let infoHtml = '<div class="title">' + ds.name + (currentYear ? ' (' + currentYear + ')' : '') + '</div>' +
    '<div class="detail">' + ds.sub + '</div>';
  document.getElementById('info').innerHTML = infoHtml;
  document.getElementById('d-res').textContent = ds.res || '—';
  // setLayerInfo() called from loadLayer() updates d-src and console

  buildLegend(ds);
  buildList(document.getElementById('search').value);
}

// ============ PMTILES TILE CACHE (IndexedDB) ============
const TileDB = {
  _db: null, DB_NAME: 'arccrop-tilecache', STORE: 'tiles', MAX_TILES: 50000, TTL: 7*24*60*60*1000,
  async open() {
    if (this._db) return this._db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(this.STORE);
      req.onsuccess = () => { this._db = req.result; resolve(this._db); };
      req.onerror = () => resolve(null);
    });
  },
  async get(key) {
    const db = await this.open(); if (!db) return null;
    return new Promise(resolve => {
      const tx = db.transaction(this.STORE, 'readonly');
      const req = tx.objectStore(this.STORE).get(key);
      req.onsuccess = () => {
        const r = req.result;
        if (r && Date.now() - r.ts < this.TTL) resolve(r.data);
        else resolve(null);
      };
      req.onerror = () => resolve(null);
    });
  },
  async put(key, data) {
    const db = await this.open(); if (!db) return;
    const tx = db.transaction(this.STORE, 'readwrite');
    tx.objectStore(this.STORE).put({ data, ts: Date.now() }, key);
  }
};

// ============ PMTILES RASTER LAYER ============
const pmtilesCache = {}; // cache PMTiles instances by URL

function createPMTilesLayer(pmtilesUrl, opts) {
  if (!pmtilesCache[pmtilesUrl]) {
    pmtilesCache[pmtilesUrl] = new pmtiles.PMTiles(pmtilesUrl);
  }
  const pm = pmtilesCache[pmtilesUrl];

  return new (L.GridLayer.extend({
    createTile: function(coords, done) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const z = coords.z, x = coords.x, y = coords.y;
      const cacheKey = pmtilesUrl + '/' + z + '/' + x + '/' + y;

      (async () => {
        try {
          // Check IndexedDB cache first
          let arrayBuf = await TileDB.get(cacheKey);
          if (!arrayBuf) {
            const result = await pm.getZxy(z, x, y);
            if (!result || !result.data || result.data.byteLength === 0) {
              done(null, canvas); return;
            }
            arrayBuf = result.data;
            TileDB.put(cacheKey, arrayBuf); // fire-and-forget
          }
          const blob = new Blob([arrayBuf], {type: 'image/png'});
          const bmp = await createImageBitmap(blob);
          ctx.drawImage(bmp, 0, 0, 256, 256);
          bmp.close();
          done(null, canvas);
        } catch(e) {
          done(null, canvas);
        }
      })();
      return canvas;
    }
  }))(opts);
}

function setLayerInfo(sources) {
  // sources: array of {method, url, zoomRange}
  // Update on-screen diagnostics badge
  const badge = sources.map(s => {
    const zr = s.zoomRange || '';
    return '<span class="src-badge src-' + s.method.toLowerCase() + '">' + s.method + (zr ? ' ' + zr : '') + '</span>';
  }).join(' ');
  document.getElementById('d-src').innerHTML = badge;
  // Console log with [Source] prefix matching crome-maps style
  const name = currentDSObj.name + (currentYear ? ' (' + currentYear + ')' : '');
  sources.forEach(s => {
    const tag = s.method === 'PMTiles' ? '[PMTiles]' : s.method === 'WMS' ? '[WMS]' : '[' + s.method + ']';
    const color = s.method === 'PMTiles' ? 'color:#4CAF50' : s.method === 'WMS' ? 'color:#FF9800' : 'color:#9C27B0';
    console.log('%c' + tag + ' %c' + name + ' %c' + (s.zoomRange || '') + ' %c' + s.url,
      color + ';font-weight:bold', 'color:#4cc9f0', 'color:#888', 'color:#666');
  });
}

let _mlResizeHandler = null;
function loadLayer() {
  if (_mlResizeHandler) { map.off('moveend', _mlResizeHandler); _mlResizeHandler = null; }
  if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
  currentMLMap = null;
  const ds = currentDSObj;
  if (!ds) return;
  const opacity = document.getElementById('opacity').value / 100;
  const year = currentYear || (yearConfig[ds.id] ? yearConfig[ds.id].def : 2023);
  tileCount = 0;

  // Vector PMTiles (EuroCrops, CROME) — rendered via MapLibre GL
  const vectorUrls = ds.vectorPmtiles
    ? (Array.isArray(ds.vectorPmtiles) ? ds.vectorPmtiles : [ds.vectorPmtiles])
    : (ds.vectorPmtilesYearFn ? [ds.vectorPmtilesYearFn(year)] : null);
  const resolvedSourceLayer = ds.sourceLayerFn ? ds.sourceLayerFn(year || yearConfig[ds.id]?.def) : ds.sourceLayer;
  if (vectorUrls && resolvedSourceLayer) {
    const vc = VECTOR_CONFIGS[ds.id] || VECTOR_CONFIGS['eurocrops'];
    const colorExpr = vc.expr;
    // Build sources and layers for each PMTiles URL
    const sources = {};
    const mlLayers = [];
    vectorUrls.forEach((url, i) => {
      const srcId = vectorUrls.length === 1 ? ds.id : ds.id + '-' + i;
      sources[srcId] = { type: 'vector', url: 'pmtiles://' + url, maxzoom: ds.vectorNativeZoom || ds.maxZoom || 14 };
      mlLayers.push({
        id: srcId + '-fill', type: 'fill', source: srcId,
        'source-layer': resolvedSourceLayer,
        filter: ['==', ['geometry-type'], 'Polygon'],
        minzoom: 7,
        paint: {
          'fill-color': colorExpr,
          'fill-opacity': ['interpolate', ['linear'], ['zoom'], 7, 0.3, 9, 0.55, 12, 0.6]
        }
      });
      mlLayers.push({
        id: srcId + '-circle', type: 'circle', source: srcId,
        'source-layer': resolvedSourceLayer,
        maxzoom: 9,
        paint: {
          'circle-color': colorExpr,
          'circle-radius': ['interpolate', ['exponential', 2], ['zoom'], 0, 0.3, 4, 0.8, 6, 1.5, 9, 3],
          'circle-opacity': 0.7
        }
      });
      mlLayers.push({
        id: srcId + '-outline', type: 'line', source: srcId,
        'source-layer': resolvedSourceLayer,
        filter: ['==', ['geometry-type'], 'Polygon'],
        minzoom: 9,
        paint: { 'line-color': '#555', 'line-width': 0.5, 'line-opacity': 0.6 }
      });
    });
    currentLayer = L.maplibreGL({
      style: { version: 8, sources, layers: mlLayers },
      interactive: false, pane: 'tilePane'
    }).addTo(map);
    currentLayer.getMaplibreMap().on('load', function() {
      currentMLMap = this;
      applyVectorFilter();
      // Keep MapLibre in sync with Leaflet view changes
      const ml = this;
      _mlResizeHandler = () => { try { ml.resize(); } catch(e) {} };
      map.on('moveend', _mlResizeHandler);
    });
    setLayerInfo(vectorUrls.map(u => ({method:'PMTiles', url:u, zoomRange:'z0-' + (ds.maxZoom||14) + ' vector'})));
    return;
  }

  // ArcGIS export image (Dynamic World etc.)
  if (ds.exportImageFn) {
    const baseUrl = ds.exportImageFn(year);
    currentLayer = new (L.GridLayer.extend({
      createTile: function(coords, done) {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const size = 20037508.342789244 * 2;
        const res = size / Math.pow(2, coords.z);
        const minX = -20037508.342789244 + coords.x * res;
        const minY = 20037508.342789244 - (coords.y + 1) * res;
        const bbox = `${minX},${minY},${minX+res},${minY+res}`;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { ctx.drawImage(img, 0, 0, 256, 256); done(null, canvas); };
        img.onerror = () => { done(null, canvas); };
        img.src = baseUrl + bbox;
        return canvas;
      }
    }))({ maxZoom: ds.maxZoom || 14, opacity, tileSize: 256 }).addTo(map);
    setLayerInfo([{method:'ArcGIS', url:'Esri ImageServer', zoomRange:'z0-'+(ds.maxZoom||14)}]);
    return;
  }

  // GeoJSON point data
  if (ds.geojsonUrl) {
    fetch(ds.geojsonUrl).then(r => r.json()).then(geojson => {
      const legendEntries = legends[ds.id] || [];
      const colorMap = {};
      legendEntries.forEach(e => { colorMap[e.l] = `rgb(${e.r},${e.g},${e.b})`; });
      currentLayer = L.geoJSON(geojson, {
        pointToLayer: (feature, latlng) => {
          const ct = feature.properties.cropType || '';
          let color = feature.properties.color || '#888';
          // Map validation crop types to legend labels
          const labelMap = {'WheatType':'Wheat','NoCropland':'No Cropland','RapeseedOrCanola':'Rapeseed/Canola','CoffeeOrTea':'Coffee/Tea'};
          const label = labelMap[ct] || ct;
          if (colorMap[label]) color = colorMap[label];
          return L.circleMarker(latlng, {
            radius: 5, fillColor: color, color: '#333', weight: 1,
            opacity: 0.8, fillOpacity: opacity
          }).bindPopup(`<b>${label}</b><br>${feature.properties.source || ''} · ${feature.properties.date || ''}<br>Irrigation: ${feature.properties.irrigation || 'N/A'}`);
        }
      }).addTo(map);
      setLayerInfo([{method:'GeoJSON', url:ds.geojsonUrl, zoomRange:'all zooms'}]);
    }).catch(e => {
      console.error('GeoJSON load error:', e);
      setLayerInfo([{method:'GeoJSON', url:ds.geojsonUrl, zoomRange:'FAILED'}]);
    });
    return;
  }

  // If dataset has year-dependent PMTiles (full raster archive per year)
  if (ds.pmtilesYearFn) {
    const pmUrl = ds.pmtilesYearFn(year);
    if (pmUrl) {
      const pmMaxZ = ds.pmtilesMaxZoom || 12;
      const pmMinZ = ds.pmtilesMinZoom || 0;
      if (ds.wms || ds.wmsYearFn) {
        // PMTiles + WMS: WMS fills gaps below pmMinZ and above pmMaxZ
        const pmLayer = createPMTilesLayer(pmUrl, {
          minZoom: pmMinZ, maxNativeZoom: pmMaxZ, maxZoom: pmMaxZ, opacity, tileSize: 256
        });
        const {baseUrl, layers} = getWmsUrl(ds, year);
        const mkWms = (minZ, maxZ) => {
          const o = { layers, styles:'', format:'image/png', transparent:true,
            version: ds.version||'1.1.1', opacity };
          if (minZ != null) o.minZoom = minZ;
          if (maxZ != null) o.maxZoom = maxZ;
          if (ds.extraParams) for (const [k,v] of Object.entries(ds.extraParams)) o[k.toLowerCase()] = v.replace('{YEAR}', String(year));
          o.crs = ds.crs4326 ? L.CRS.EPSG4326 : L.CRS.EPSG3857;
          return L.tileLayer.wms(baseUrl, o);
        };
        const allLayers = [];
        const info = [];
        if (pmMinZ > 0) {
          allLayers.push(mkWms(null, pmMinZ - 1));
          info.push({method:'WMS', url:baseUrl+'?LAYERS='+layers, zoomRange:'z0-'+(pmMinZ-1)});
        }
        allLayers.push(pmLayer);
        info.push({method:'PMTiles', url:pmUrl, zoomRange:'z'+pmMinZ+'-'+pmMaxZ});
        allLayers.push(mkWms(pmMaxZ + 1, ds.maxZoom || 19));
        info.push({method:'WMS', url:baseUrl+'?LAYERS='+layers, zoomRange:'z'+(pmMaxZ+1)+'-'+(ds.maxZoom||19)});
        currentLayer = L.layerGroup(allLayers).addTo(map);
        setLayerInfo(info);
      } else {
        // PMTiles only — upscale beyond native zoom for full coverage
        currentLayer = createPMTilesLayer(pmUrl, {
          maxNativeZoom: pmMaxZ, maxZoom: 18, opacity, tileSize: 256
        }).addTo(map);
        setLayerInfo([{method:'PMTiles', url:pmUrl, zoomRange:'z0-'+pmMaxZ+' (upscaled to z18)'}]);
      }
      return;
    }
    // pmtilesYearFn returned null — fall through to WMS if available
  }

  // If dataset has overview PMTiles, use combined PMTiles + WMS layer
  if (ds.overviewPmtiles) {
    const ovMaxZ = ds.overviewMaxZoom || 14;
    const ovMinZ = ds.overviewMinZoom || 0;
    const pmLayer = createPMTilesLayer(ds.overviewPmtiles, {
      minZoom: ovMinZ, maxZoom: ovMaxZ, opacity, tileSize: 256
    });
    const {baseUrl, layers} = getWmsUrl(ds, year);
    const wmsLayers = [];
    // WMS below PMTiles range
    if (ovMinZ > 0) {
      const wmsLow = {
        layers: layers, styles: '', format: 'image/png', transparent: true,
        version: ds.version || '1.1.1', maxZoom: ovMinZ - 1, opacity,
      };
      if (ds.extraParams) {
        for (const [k, v] of Object.entries(ds.extraParams)) {
          wmsLow[k.toLowerCase()] = v.replace('{YEAR}', String(year));
        }
      }
      wmsLow.crs = ds.crs4326 ? L.CRS.EPSG4326 : L.CRS.EPSG3857;
      wmsLayers.push(L.tileLayer.wms(baseUrl, wmsLow));
    }
    // WMS above PMTiles range
    const wmsOpts = {
      layers: layers, styles: '', format: 'image/png', transparent: true,
      version: ds.version || '1.1.1', minZoom: ovMaxZ + 1,
      maxZoom: ds.maxZoom || 19, opacity,
    };
    if (ds.extraParams) {
      for (const [k, v] of Object.entries(ds.extraParams)) {
        wmsOpts[k.toLowerCase()] = v.replace('{YEAR}', String(year));
      }
    }
    wmsOpts.crs = ds.crs4326 ? L.CRS.EPSG4326 : L.CRS.EPSG3857;
    const wmsHi = L.tileLayer.wms(baseUrl, wmsOpts);
    const allLayers = [...wmsLayers, pmLayer, wmsHi];
    currentLayer = L.layerGroup(allLayers).addTo(map);
    const info = [];
    if (ovMinZ > 0) info.push({method:'WMS', url:baseUrl+'?LAYERS='+layers, zoomRange:'z0-'+(ovMinZ-1)});
    info.push({method:'PMTiles', url:ds.overviewPmtiles, zoomRange:'z'+ovMinZ+'-'+ovMaxZ});
    info.push({method:'WMS', url:baseUrl+'?LAYERS='+layers, zoomRange:'z'+(ovMaxZ+1)+'-'+(ds.maxZoom||19)});
    setLayerInfo(info);
    return;
  }

  if (ds.xyz || ds.customUrl) {
    let url = ds.customUrl || ds.url;
    if (url.includes('{YEAR}')) url = url.replace('{YEAR}', String(year));
    currentLayer = L.tileLayer(url, {
      maxZoom: ds.maxZoom || 18, opacity, attribution: ds.name
    }).addTo(map);
    const method = url.includes('WMTS') ? 'WMTS' : 'XYZ';
    setLayerInfo([{method, url:url.replace(/\{[zxy]\}/g,'*'), zoomRange:'z0-'+(ds.maxZoom||18)}]);
  } else {
    const {baseUrl, layers} = getWmsUrl(ds, year);
    const wmsOpts = {
      layers: layers,
      styles: '',
      format: 'image/png',
      transparent: true,
      version: ds.version || '1.1.1',
      maxZoom: ds.maxZoom || 18,
      opacity,
    };
    if (ds.extraParams) {
      for (const [k, v] of Object.entries(ds.extraParams)) {
        wmsOpts[k.toLowerCase()] = v.replace('{YEAR}', String(year));
      }
    }
    wmsOpts.crs = ds.crs4326 ? L.CRS.EPSG4326 : L.CRS.EPSG3857;
    currentLayer = L.tileLayer.wms(baseUrl, wmsOpts).addTo(map);
    const crs = ds.crs4326 ? 'EPSG:4326' : 'EPSG:3857';
    setLayerInfo([{method:'WMS', url:baseUrl+'?LAYERS='+layers+'&CRS='+crs, zoomRange:'z0-'+(ds.maxZoom||18)}]);
  }

  // Track tile loads
  if (currentLayer) {
    currentLayer.on('tileloadstart', () => { tileCount++; updateTileCount(); });
    currentLayer.on('loading', () => { tileCount = 0; });
  }
}

function updateTileCount() {
  document.getElementById('d-tiles').textContent = tileCount + ' loaded';
}

// ============ YEAR CONTROLS ============
function getYearFromSlider() {
  const yc = yearConfig[currentDSObj?.id];
  if (!yc) return null;
  const slider = document.getElementById('year-slider');
  return yc.values ? yc.values[parseInt(slider.value)] : parseInt(slider.value);
}

function updateYearDisplay() {
  const y = getYearFromSlider();
  if (y) document.getElementById('year-val').textContent = y;
}

function changeYear(delta) {
  const slider = document.getElementById('year-slider');
  slider.value = parseInt(slider.value) + delta;
  currentYear = getYearFromSlider();
  updateYearDisplay();
  loadLayer();
  // Update info
  document.getElementById('info').innerHTML =
    '<div class="title">' + currentDSObj.name + ' (' + currentYear + ')</div>' +
    '<div class="detail">' + currentDSObj.sub + '</div>';
}

document.getElementById('year-prev').onclick = () => changeYear(-1);
document.getElementById('year-next').onclick = () => changeYear(1);
document.getElementById('year-slider').oninput = function() {
  currentYear = getYearFromSlider();
  updateYearDisplay();
};
document.getElementById('year-slider').onchange = function() {
  currentYear = getYearFromSlider();
  updateYearDisplay();
  loadLayer();
  document.getElementById('info').innerHTML =
    '<div class="title">' + currentDSObj.name + ' (' + currentYear + ')</div>' +
    '<div class="detail">' + currentDSObj.sub + '</div>';
};

// ============ LEGEND ============
function buildLegend(ds) {
  const el = document.getElementById('legend');

  // Vector PMTiles: categorised legend (EuroCrops, CROME, etc.)
  const vc = VECTOR_CONFIGS[ds.id];
  if (vc && (ds.vectorPmtiles || ds.vectorPmtilesYearFn)) {
    let html = '<div class="legend-title"><span>Legend</span>' +
      '<div class="legend-btns"><button onclick="toggleAllBtn()">Toggle all</button></div></div>';
    vc.categories.forEach(cat => {
      const allHidden = cat.key.every(k => hiddenClasses.has(k));
      html += `<div class="legend-entry" style="font-weight:bold;margin-top:4px;cursor:pointer;opacity:${allHidden?'0.4':'1'}" onclick="toggleVectorCategory('${cat.name}')">` +
        `<span class="legend-label">${cat.name}</span></div>`;
      cat.key.forEach(k => {
        const isHidden = hiddenClasses.has(k);
        const c = vc.colors[k] || '#888';
        html += `<div class="legend-entry${isHidden ? ' hidden' : ''}" onclick="toggleClass('${k}')">` +
          `<div class="legend-swatch" style="background:${c}"></div>` +
          `<span class="legend-label">${vc.nameFunc(k)}</span></div>`;
      });
    });
    html += `<div style="font-size:10px;color:#888;margin-top:4px">${vc.footer}</div>`;
    el.innerHTML = html;
    el.style.display = 'block';
    return;
  }

  const entries = legends[ds.id];
  if (!entries || entries.length === 0) {
    el.innerHTML = '<div class="no-legend">No legend available for this dataset</div>';
    el.style.display = 'block';
    return;
  }
  let html = '<div class="legend-title"><span>Legend</span>' +
    '<div class="legend-btns"><button onclick="toggleAllBtn()">Toggle all</button></div></div>';
  entries.forEach((e, i) => {
    const isHidden = hiddenClasses.has(e.l);
    html += `<div class="legend-entry${isHidden ? ' hidden' : ''}" onclick="toggleClass('${e.l.replace(/'/g,"\\'")}', ${i})">` +
      `<div class="legend-swatch" style="background:rgb(${e.r},${e.g},${e.b})"></div>` +
      `<span class="legend-label">${e.l}</span></div>`;
  });
  el.innerHTML = html;
  el.style.display = 'block';
}

function toggleClass(label) {
  if (hiddenClasses.has(label)) hiddenClasses.delete(label);
  else hiddenClasses.add(label);
  buildLegend(currentDSObj);
  if (VECTOR_CONFIGS[currentDSObj?.id]) { applyVectorFilter(); return; }
  if (currentDSObj?.geojsonUrl) { applyGeoJSONFilter(); return; }
  applyFilter();
}

function applyGeoJSONFilter() {
  if (!currentLayer || !currentDSObj?.geojsonUrl) return;
  const labelMap = {'WheatType':'Wheat','NoCropland':'No Cropland','RapeseedOrCanola':'Rapeseed/Canola','CoffeeOrTea':'Coffee/Tea'};
  currentLayer.eachLayer(marker => {
    const ct = marker.feature?.properties?.cropType || '';
    const label = labelMap[ct] || ct;
    marker.setStyle({ fillOpacity: hiddenClasses.has(label) ? 0 : 0.7, opacity: hiddenClasses.has(label) ? 0 : 0.8 });
  });
}

function toggleAll(show) {
  const vc = VECTOR_CONFIGS[currentDSObj?.id];
  if (vc) {
    hiddenClasses.clear();
    if (!show) Object.keys(vc.colors).forEach(k => hiddenClasses.add(k));
    buildLegend(currentDSObj);
    applyVectorFilter();
    return;
  }
  const entries = legends[currentDSObj?.id];
  if (!entries) return;
  hiddenClasses.clear();
  if (!show) entries.forEach(e => hiddenClasses.add(e.l));
  buildLegend(currentDSObj);
  if (currentDSObj?.geojsonUrl) { applyGeoJSONFilter(); return; }
  applyFilter();
}

function toggleAllBtn() {
  // If any classes are hidden, show all; otherwise hide all
  if (hiddenClasses.size > 0) {
    toggleAll(true);
  } else {
    toggleAll(false);
  }
}

function toggleVectorCategory(catName) {
  const vc = VECTOR_CONFIGS[currentDSObj?.id];
  if (!vc) return;
  const cat = vc.categories.find(c => c.name === catName);
  if (!cat) return;
  const allHidden = cat.key.every(k => hiddenClasses.has(k));
  cat.key.forEach(k => { if (allHidden) hiddenClasses.delete(k); else hiddenClasses.add(k); });
  buildLegend(currentDSObj);
  applyVectorFilter();
}

function applyVectorFilter() {
  if (!currentMLMap) return;
  const dsId = currentDSObj?.id || 'eurocrops';
  const vc = VECTOR_CONFIGS[dsId];
  const filterProp = vc ? vc.prop : 'EC_hcat_n';
  // EuroCrops has mixed property names (crop vs EC_hcat_n) across tile batches
  const getPropExpr = dsId === 'eurocrops' ? ['coalesce', ['get', 'EC_hcat_n'], ['get', 'crop']] : ['get', filterProp];
  const polyBase = ['==', ['geometry-type'], 'Polygon'];
  // Find all layer IDs for this dataset (may have suffixed IDs for multi-source)
  const allLayers = currentMLMap.getStyle().layers.map(l => l.id);
  const fillLayers = allLayers.filter(id => id.startsWith(dsId) && id.endsWith('-fill'));
  const outlineLayers = allLayers.filter(id => id.startsWith(dsId) && id.endsWith('-outline'));
  const circleLayers = allLayers.filter(id => id.startsWith(dsId) && id.endsWith('-circle'));
  if (hiddenClasses.size === 0) {
    fillLayers.forEach(id => currentMLMap.setFilter(id, polyBase));
    outlineLayers.forEach(id => currentMLMap.setFilter(id, polyBase));
    circleLayers.forEach(id => currentMLMap.setFilter(id, null));
  } else {
    const hidden = [...hiddenClasses];
    const polyFilter = ['all', polyBase, ['!', ['in', getPropExpr, ['literal', hidden]]]];
    const dotFilter = ['!', ['in', getPropExpr, ['literal', hidden]]];
    fillLayers.forEach(id => currentMLMap.setFilter(id, polyFilter));
    outlineLayers.forEach(id => currentMLMap.setFilter(id, polyFilter));
    circleLayers.forEach(id => currentMLMap.setFilter(id, dotFilter));
  }
}

// ============ CANVAS PIXEL FILTERING ============
function filterPixels(ctx, visibleColors) {
  try {
    const ds = currentDSObj;
    const allEntries = ds ? legends[ds.id] : null;
    const imageData = ctx.getImageData(0, 0, 256, 256);
    const d = imageData.data;

    if (allEntries && allEntries.length > 1) {
      // Nearest-class mode: assign each pixel to its nearest legend class,
      // then hide if that class is hidden. Works for both discrete and range/gradient legends.
      const allColors = allEntries.map(e => [e.r, e.g, e.b, e.l]);
      for (let i = 0; i < d.length; i += 4) {
        if (d[i+3] === 0) continue;
        const r = d[i], g = d[i+1], b = d[i+2];
        let bestDist = Infinity, bestLabel = '';
        for (const [cr, cg, cb, label] of allColors) {
          const dist = (r-cr)*(r-cr) + (g-cg)*(g-cg) + (b-cb)*(b-cb);
          if (dist < bestDist) { bestDist = dist; bestLabel = label; }
        }
        if (hiddenClasses.has(bestLabel)) d[i+3] = 0;
      }
    } else {
      // Fallback: simple color match
      for (let i = 0; i < d.length; i += 4) {
        if (d[i+3] === 0) continue;
        const r = d[i], g = d[i+1], b = d[i+2];
        let keep = false;
        for (const [vr, vg, vb] of visibleColors) {
          if (Math.abs(r-vr) + Math.abs(g-vg) + Math.abs(b-vb) < 80) { keep = true; break; }
        }
        if (!keep) d[i+3] = 0;
      }
    }
    ctx.putImageData(imageData, 0, 0);
  } catch(e) { /* tainted canvas — show unfiltered */ }
}

function buildWmsUrlFn(ds, year) {
  if (ds.xyz || ds.customUrl) {
    let url = ds.customUrl || ds.url;
    if (url.includes('{YEAR}')) url = url.replace('{YEAR}', String(year));
    return (coords) => L.Util.template(url, {z: coords.z, x: coords.x, y: coords.y, s: 'a'});
  }
  const {baseUrl, layers} = getWmsUrl(ds, year);
  if (!baseUrl) return null;
  return (coords) => {
    const tileSize = 256;
    const nw = map.unproject([coords.x * tileSize, coords.y * tileSize], coords.z);
    const se = map.unproject([(coords.x + 1) * tileSize, (coords.y + 1) * tileSize], coords.z);
    const crsKey = ds.version === '1.3.0' ? 'CRS' : 'SRS';
    const srs = ds.crs4326 ? 'EPSG:4326' : 'EPSG:3857';
    let bbox;
    if (ds.crs4326) {
      const ver = parseFloat(ds.version || '1.1.1');
      bbox = ver >= 1.3 ? `${se.lat},${nw.lng},${nw.lat},${se.lng}` : `${nw.lng},${se.lat},${se.lng},${nw.lat}`;
    } else {
      const nwM = L.CRS.EPSG3857.project(nw);
      const seM = L.CRS.EPSG3857.project(se);
      bbox = `${nwM.x},${seM.y},${seM.x},${nwM.y}`;
    }
    const stylesVal = (ds.extraParams && ds.extraParams.STYLES) ? encodeURIComponent(ds.extraParams.STYLES) : '';
    let url = `${baseUrl}?SERVICE=WMS&VERSION=${ds.version}&REQUEST=GetMap&LAYERS=${encodeURIComponent(layers)}` +
      `&STYLES=${stylesVal}&${crsKey}=${srs}&BBOX=${bbox}&WIDTH=${tileSize}&HEIGHT=${tileSize}&FORMAT=image/png&TRANSPARENT=TRUE`;
    if (ds.extraParams) {
      for (const [k, v] of Object.entries(ds.extraParams)) {
        if (k.toUpperCase() === 'STYLES') continue;
        url += `&${k}=${encodeURIComponent(v.replace('{YEAR}', String(year)))}`;
      }
    }
    return url;
  };
}

async function loadImageFiltered(url, ctx, visibleColors, done) {
  try {
    // Use fetch+blob to avoid canvas tainting (same approach as PMTiles)
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    const blob = await resp.blob();
    const bmp = await createImageBitmap(blob);
    ctx.drawImage(bmp, 0, 0, 256, 256);
    bmp.close();
    filterPixels(ctx, visibleColors);
    done(null, ctx.canvas);
  } catch(e) {
    // CORS or network error — show tile unfiltered via img element
    const img = new Image();
    img.onload = function() { ctx.drawImage(img, 0, 0, 256, 256); done(null, ctx.canvas); };
    img.onerror = function() { done(null, ctx.canvas); };
    img.src = url;
  }
}

async function loadPMTilesFiltered(pmSource, pmUrl, coords, ctx, visibleColors, done) {
  try {
    const cacheKey = pmUrl + '/' + coords.z + '/' + coords.x + '/' + coords.y;
    let arrayBuf = await TileDB.get(cacheKey);
    if (!arrayBuf) {
      const result = await pmSource.getZxy(coords.z, coords.x, coords.y);
      if (!result || !result.data || result.data.byteLength === 0) { done(null, ctx.canvas); return; }
      arrayBuf = result.data;
      TileDB.put(cacheKey, arrayBuf);
    }
    const blob = new Blob([arrayBuf], {type: 'image/png'});
    const bmp = await createImageBitmap(blob);
    ctx.drawImage(bmp, 0, 0, 256, 256);
    bmp.close();
    filterPixels(ctx, visibleColors);
    done(null, ctx.canvas);
  } catch(e) { done(null, ctx.canvas); }
}

function applyFilter() {
  const ds = currentDSObj;
  if (!ds) return;
  const entries = legends[ds.id];
  if (!entries) return;

  const visibleColors = entries.filter(e => !hiddenClasses.has(e.l)).map(e => [e.r, e.g, e.b]);

  // If all visible, reload unfiltered
  if (hiddenClasses.size === 0) {
    if (currentLayer && currentLayer._isFiltered) loadLayer();
    return;
  }

  if (currentLayer) map.removeLayer(currentLayer);
  const opacity = document.getElementById('opacity').value / 100;
  const year = currentYear || (yearConfig[ds.id] ? yearConfig[ds.id].def : 2023);

  // Determine PMTiles source
  let pmSource = null, pmUrl = null, pmMaxZoom = 0;
  if (ds.pmtilesYearFn) {
    pmUrl = ds.pmtilesYearFn(year);
    if (pmUrl) {
      if (!pmtilesCache[pmUrl]) pmtilesCache[pmUrl] = new pmtiles.PMTiles(pmUrl);
      pmSource = pmtilesCache[pmUrl];
      pmMaxZoom = ds.pmtilesMaxZoom || 12;
    }
  } else if (ds.overviewPmtiles) {
    pmUrl = ds.overviewPmtiles;
    if (!pmtilesCache[pmUrl]) pmtilesCache[pmUrl] = new pmtiles.PMTiles(pmUrl);
    pmSource = pmtilesCache[pmUrl];
    pmMaxZoom = ds.overviewMaxZoom || 14;
  }

  // Determine WMS/XYZ URL function
  const wmsUrlFn = buildWmsUrlFn(ds, year);

  const hidden = entries.filter(e => hiddenClasses.has(e.l)).map(e => e.l);
  console.log('%c[Filter] %c' + ds.name + ': hiding ' + hidden.length + '/' + entries.length + ' classes',
    'color:#f90;font-weight:bold', 'color:#888', '\n  ' + hidden.join(', '));
  if (pmSource) console.log('%c[Filter] %cPMTiles z0-' + pmMaxZoom, 'color:#4CAF50;font-weight:bold', 'color:#666', pmUrl);
  if (wmsUrlFn) console.log('%c[Filter] %cWMS z' + (pmSource ? pmMaxZoom+1 : 0) + '+', 'color:#FF9800;font-weight:bold', 'color:#666');

  const FilteredLayer = L.GridLayer.extend({
    createTile: function(coords, done) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 256;
      const ctx = canvas.getContext('2d');

      if (pmSource && coords.z <= pmMaxZoom) {
        // Use PMTiles for this zoom level
        loadPMTilesFiltered(pmSource, pmUrl, coords, ctx, visibleColors, done);
      } else if (wmsUrlFn) {
        // Use WMS/XYZ
        loadImageFiltered(wmsUrlFn(coords), ctx, visibleColors, done);
      } else {
        done(null, canvas);
      }
      return canvas;
    }
  });

  const maxZ = Math.max(pmMaxZoom, ds.maxZoom || 18);
  currentLayer = new FilteredLayer({ maxZoom: maxZ, opacity, tileSize: 256, keepBuffer: 8 });
  currentLayer._isFiltered = true;
  currentLayer.addTo(map);
}

// ============ DIAGNOSTICS ============
function updateDiagnostics() {
  const z = map.getZoom();
  const center = map.getCenter();
  const zi = Math.round(z);
  document.getElementById('d-zoom').textContent = z.toFixed(1);

  // Compute scale: meters per pixel at this zoom and latitude
  const mpp = 156543.03 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, z);
  // Scale at 96 DPI: 1 pixel = 1/96 inch = 0.0254/96 m
  const scaleDenom = Math.round(mpp / (0.0254 / 96));
  let scaleStr;
  if (scaleDenom >= 1000000) scaleStr = '1:' + (scaleDenom/1000000).toFixed(1) + 'M';
  else if (scaleDenom >= 1000) scaleStr = '1:' + (scaleDenom/1000).toFixed(0) + 'K';
  else scaleStr = '1:' + scaleDenom;
  document.getElementById('d-scale').textContent = scaleStr;

  // Show which source is active at current zoom
  const ds = currentDSObj;
  if (!ds) return;
  let activeSource = '';
  if (ds.pmtilesYearFn) {
    const pmMaxZ = ds.pmtilesMaxZoom || 12;
    const yr = currentYear || yearConfig[ds.id]?.def || 2023;
    const hasPm = !!ds.pmtilesYearFn(yr);
    if (hasPm && zi <= pmMaxZ) activeSource = 'PMTiles z' + zi;
    else if (ds.wms || ds.wmsYearFn) activeSource = 'WMS z' + zi;
    else activeSource = 'PMTiles z' + zi;
  } else if (ds.overviewPmtiles) {
    const ovMaxZ = ds.overviewMaxZoom || 14;
    activeSource = zi <= ovMaxZ ? 'PMTiles z' + zi : 'WMS z' + zi;
  } else if (ds.customUrl && ds.xyz) {
    activeSource = (ds.customUrl.includes('WMTS') ? 'WMTS' : 'XYZ') + ' z' + zi;
  } else {
    activeSource = 'WMS z' + zi;
  }
  document.getElementById('d-tiles').textContent = (tileCount ? tileCount + ' tiles \u00B7 ' : '') + activeSource;

}

map.on('zoomend moveend', updateDiagnostics);
updateDiagnostics();

// ============ SIDEBAR ============
const listEl = document.getElementById('dataset-list');
const searchEl = document.getElementById('search');

function getSourceBadge(ds) {
  if (ds.geojsonUrl) return '<span class="ds-badge ds-badge-xyz">GEO</span>';
  if (ds.vectorPmtiles || ds.vectorPmtilesYearFn) return '<span class="ds-badge ds-badge-pmt">VEC</span>';
  if (ds.pmtilesYearFn && !(ds.wms || ds.wmsYearFn)) return '<span class="ds-badge ds-badge-pmt">PMT</span>';
  if (ds.pmtilesYearFn) return '<span class="ds-badge ds-badge-pmt">PMT</span><span class="ds-badge ds-badge-wms">WMS</span>';
  if (ds.overviewPmtiles) return '<span class="ds-badge ds-badge-pmt">PMT</span><span class="ds-badge ds-badge-wms">WMS</span>';
  if (ds.exportImageFn) return '<span class="ds-badge ds-badge-ext">IMG</span>';
  if (ds.customUrl && ds.xyz) return ds.customUrl.includes('WMTS') ? '<span class="ds-badge ds-badge-wmts">WMTS</span>' : '<span class="ds-badge ds-badge-xyz">XYZ</span>';
  return '<span class="ds-badge ds-badge-wms">WMS</span>';
}

function buildList(filter = '') {
  listEl.innerHTML = '';
  let lastSection = '';
  const lc = filter.toLowerCase();
  datasets.forEach(ds => {
    if (lc && !ds.name.toLowerCase().includes(lc) && !ds.sub.toLowerCase().includes(lc) && !ds.section.toLowerCase().includes(lc)) return;
    if (ds.section !== lastSection) {
      lastSection = ds.section;
      const h = document.createElement('div');
      h.className = 'section-title';
      h.textContent = ds.section;
      listEl.appendChild(h);
    }
    const btn = document.createElement('button');
    btn.className = 'ds-btn' + (ds.broken ? ' broken' : '') + (currentDS === ds.id ? ' active' : '');
    const yearStr = yearConfig[ds.id] ? ' (' + (currentDS === ds.id && currentYear ? currentYear : yearConfig[ds.id]?.def || '') + ')' : '';
    btn.innerHTML = ds.name + yearStr + getSourceBadge(ds) + '<span class="sub">' + ds.sub + '</span>';
    btn.onclick = () => { if (currentDS === ds.id) clearDataset(); else selectDataset(ds); };
    listEl.appendChild(btn);
  });
}

// Opacity
function setLayerOpacity(layer, opacity) {
  if (!layer) return;
  if (typeof layer.setOpacity === 'function') {
    layer.setOpacity(opacity);
  }
  if (typeof layer.eachLayer === 'function') {
    layer.eachLayer(l => { if (typeof l.setOpacity === 'function') l.setOpacity(opacity); });
  }
}
document.getElementById('opacity').addEventListener('input', function() {
  document.getElementById('opacity-val').textContent = this.value + '%';
  setLayerOpacity(currentLayer, this.value / 100);
});

searchEl.addEventListener('input', () => buildList(searchEl.value));

buildList();
selectDataset(datasets[0]);

// ============ VARDA GLOBAL FIELD ID ============
const vardaClientIdInput = document.getElementById('varda-client-id');
const vardaSecretInput = document.getElementById('varda-client-secret');
const vardaPanel = document.getElementById('varda-panel');
const vardaBody = document.getElementById('varda-body');
let vardaMarker = null;
let vardaBoundaryLayer = null;
let vardaBoundaryFeatures = [];

// Persist credentials
vardaClientIdInput.value = localStorage.getItem('varda-client-id') || '';
vardaSecretInput.value = localStorage.getItem('varda-client-secret') || '';
vardaClientIdInput.addEventListener('change', () => {
  const v = vardaClientIdInput.value.trim();
  if (v) localStorage.setItem('varda-client-id', v); else localStorage.removeItem('varda-client-id');
  localStorage.removeItem('varda-access-token');
});
vardaSecretInput.addEventListener('change', () => {
  const v = vardaSecretInput.value.trim();
  if (v) localStorage.setItem('varda-client-secret', v); else localStorage.removeItem('varda-client-secret');
  localStorage.removeItem('varda-access-token');
});

async function getVardaToken() {
  const cached = localStorage.getItem('varda-access-token');
  const expiry = parseInt(localStorage.getItem('varda-token-expiry') || '0');
  if (cached && Date.now() < expiry) return cached;
  const clientId = localStorage.getItem('varda-client-id');
  const secret = localStorage.getItem('varda-client-secret');
  if (!clientId || !secret) return null;
  try {
    const r = await fetch('https://auth.varda.ag/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'client_id=' + encodeURIComponent(clientId) +
            '&client_secret=' + encodeURIComponent(secret) +
            '&audience=https://api.varda.ag/fid/&grant_type=client_credentials'
    });
    if (!r.ok) return null;
    const data = await r.json();
    if (data.access_token) {
      localStorage.setItem('varda-access-token', data.access_token);
      const ttl = ((data.expires_in || 86400) - 60) * 1000;
      localStorage.setItem('varda-token-expiry', String(Date.now() + ttl));
      return data.access_token;
    }
  } catch (e) { console.warn('Varda auth error:', e); }
  return null;
}

document.getElementById('varda-close').addEventListener('click', () => {
  vardaPanel.classList.remove('open');
  if (vardaMarker) { map.removeLayer(vardaMarker); vardaMarker = null; }
  if (vardaBoundaryLayer) { map.removeLayer(vardaBoundaryLayer); vardaBoundaryLayer = null; }
});

map.on('click', async e => {
  const hasVardaCreds = localStorage.getItem('varda-client-id') && localStorage.getItem('varda-client-secret');
  if (!hasVardaCreds) return;

  const { lat, lng } = e.latlng;

  // Place marker
  if (vardaMarker) map.removeLayer(vardaMarker);
  vardaMarker = L.circleMarker(e.latlng, {
    radius: 6, fillColor: '#7cb342', color: '#fff', weight: 2, fillOpacity: 0.9
  }).addTo(map);

  // Clear previous boundary
  if (vardaBoundaryLayer) { map.removeLayer(vardaBoundaryLayer); vardaBoundaryLayer = null; }

  // Show panel with loading
  vardaPanel.classList.add('open');
  vardaBody.innerHTML = '<div class="vp-coord">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</div>' +
    '<div class="vp-none">Looking up field...</div>';

  const token = await getVardaToken();
  if (!token) {
    vardaBody.innerHTML = '<div class="vp-coord">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</div>' +
      '<div class="vp-none">Auth failed (check credentials)</div>';
    return;
  }

  fetch('https://api.varda.ag/fid/v1/field-searches', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ type: 'Point', coordinates: [lng, lat] })
  })
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    vardaBoundaryFeatures = [];
    let html = '<div class="vp-coord">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</div>';
    if (data && data.data && data.data.length > 0) {
      data.data.forEach(field => {
        const fid = field.fieldId || field.id || '—';
        html += '<div class="vp-field"><b>Field ID:</b> ' + fid +
          ' <a href="https://fieldid.varda.ag/" target="_blank" title="Open Varda viewer">&#8599;</a></div>';
        if (field.boundaries && field.boundaries.length) {
          field.boundaries.forEach(b => {
            if (b.boundaryId) html += '<div class="vp-field" style="padding-left:8px"><b>Boundary:</b> ' + b.boundaryId + '</div>';
            if (b.geometry) vardaBoundaryFeatures.push({ type: 'Feature', geometry: b.geometry, properties: { fieldId: fid, boundaryId: b.boundaryId || '' } });
          });
        }
        if (field.geometry) {
          vardaBoundaryFeatures.push({ type: 'Feature', geometry: field.geometry, properties: { fieldId: fid } });
        }
      });
      // Draw boundaries
      if (vardaBoundaryFeatures.length) {
        vardaBoundaryLayer = L.geoJSON({ type: 'FeatureCollection', features: vardaBoundaryFeatures }, {
          style: { color: '#558b2f', weight: 2.5, dashArray: '6,4', fillColor: '#7cb342', fillOpacity: 0.12 }
        }).addTo(map);
        html += '<button class="vp-save" id="varda-save-btn">Save GeoJSON</button>';
      }
    } else {
      html += '<div class="vp-none">No field registered at this location</div>';
    }
    vardaBody.innerHTML = html;
    // Wire up save button
    const saveBtn = document.getElementById('varda-save-btn');
    if (saveBtn) {
      saveBtn.addEventListener('click', () => {
        if (!vardaBoundaryFeatures.length) return;
        const fc = { type: 'FeatureCollection', features: vardaBoundaryFeatures };
        const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/geo+json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'varda_fields_' + lng.toFixed(4) + '_' + lat.toFixed(4) + '.geojson';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    }
  })
  .catch(() => {
    vardaBody.innerHTML = '<div class="vp-coord">' + lat.toFixed(6) + ', ' + lng.toFixed(6) + '</div>' +
      '<div class="vp-none">Lookup failed (check credentials)</div>';
  });
});
</script>
